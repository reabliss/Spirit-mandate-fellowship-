<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spirit Mandate</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            background-color: navy;
            margin:0;
            padding:0;
            color:white;
        }

        .container{
            max-width:500px;
            margin:50px auto;
            background:white;
            color:black;
            padding:30px;
            border-radius:10px;
        }

        h1{
            text-align:center;
            color:navy;
        }

        input, button{
            width:100%;
            padding:12px;
            margin:10px 0;
            border-radius:5px;
            border:1px solid gray;
            box-sizing:border-box;
        }

        button{
            background-color:navy;
            color:white;
            border:none;
        }

        .contact{
            text-align:center;
            margin-top:20px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Spirit Mandate</h1>

    <form name="spirit-mandate" method="POST" data-netlify="true">
        <input type="hidden" name="form-name" value="spirit-mandate">

        <input type="text" name="name" placeholder="Full Name" required>
        <input type="tel" name="number" placeholder="Phone Number" required>
        <input type="date" name="birthday" required>
        <input type="text" name="department" placeholder="Department" required>

        <button type="submit">Join Fellowship</button>
    </form>

    <div class="contact">
        <p>Email: spiritmandate@gmail.com</p>
        <p>Phone: +2347055050150</p>
    </div>
</div>

</body>
</html>
